                  type: string
                  enum:
                    - t4g.nano
                    - t3a.nano
                    - t3.nano
                    - t4g.micro
                    - t4g.small
                    - t4g.medium
                    - m6g.medium
                    - m6g.large
                    - m6g.xlarge
                    - m6g.2xlarge
                    - m6g.4xlarge
                    - m6g.8xlarge
                    - m6g.12xlarge
                    - m6g.16xlarge
                    - m8g.24xlarge
                    - c8g.24xlarge
