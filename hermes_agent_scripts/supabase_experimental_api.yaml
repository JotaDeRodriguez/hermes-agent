  /v0/auth/{ref}/config:
    get:
      operationId: getGoTrueConfig
      parameters:
        - name: ref
          required: true
          in: path
          description: Project ref
          schema:
            minLength: 20
            maxLength: 20
            pattern: ^[a-z]+$
            example: abcdefghijklmnopqrst
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoTrueConfigResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden action
        "429":
          description: Rate limit exceeded
        "500":
          description: Failed to retrieve Auth config
      security:
        - bearer: []
      summary: Gets Auth config
      tags:
        - Projects Auth
      x-endpoint-owners:
        - auth
