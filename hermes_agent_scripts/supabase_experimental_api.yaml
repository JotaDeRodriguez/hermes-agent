        - name: limit
          required: false
          in: query
          description: Number of projects to return per page
          schema:
            minimum: 1
            maximum: 100
            default: 100
            type: integer
        - name: search
          required: false
          in: query
          description: Search projects by name
          schema:
            type: string
        - name: sort
          required: false
          in: query
          description: Sort order for projects
          schema:
