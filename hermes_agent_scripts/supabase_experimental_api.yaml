                    selects the cheapest region-available type for this arch and
                    may cross to the other arch if no ODCR capacity is
                    available. Cannot be set together with instance_type. Only
                    for internal use.
          required:
            - ami
        desired_instance_size:
          type: string
          enum:
            - micro
            - small
            - medium
            - large
            - xlarge
            - 2xlarge
            - 4xlarge
            - 8xlarge
            - 12xlarge
            - 16xlarge
            - 24xlarge
            - 24xlarge_optimized_memory
            - 24xlarge_optimized_cpu
            - 24xlarge_high_memory
