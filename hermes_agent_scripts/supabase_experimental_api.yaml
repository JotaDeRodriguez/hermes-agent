                    - x8g.24xlarge
                    - m8g.48xlarge
                    - c8g.48xlarge
                    - r8g.48xlarge
                    - x8g.48xlarge
                  description: Exact AWS instance type to provision (e.g. `t3.nano`, `t4g.nano`).
